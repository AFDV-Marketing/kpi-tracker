<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KPI Tracker{% endblock %} — AFDV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .score-green { background: #065f46; color: #6ee7b7; }
        .score-yellow { background: #78350f; color: #fcd34d; }
        .score-red { background: #7f1d1d; color: #fca5a5; }
        .score-na { background: #1f2937; color: #6b7280; }
        .dot-green { background: #10b981; }
        .dot-yellow { background: #f59e0b; }
        .dot-red { background: #ef4444; }
        .dot-na { background: #4b5563; }
        body { background: #0f172a; color: #e2e8f0; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .card-header { border-bottom: 1px solid #334155; }
        input, select, textarea { background: #0f172a; border: 1px solid #475569; color: #e2e8f0; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
        a { color: #60a5fa; }
        a:hover { color: #93bbfd; }
        .progress-bar { background: #334155; border-radius: 9999px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 9999px; transition: width 0.3s; }
    </style>
</head>
<body class="h-full">
    <nav class="border-b border-slate-700 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="/" class="text-xl font-bold text-white no-underline">AFDV Performance</a>
            <span class="text-slate-500 text-sm">KPI Tracker</span>
        </div>
        <div class="flex items-center gap-4 text-sm">
            <a href="/" class="text-slate-400 hover:text-white no-underline">Dashboard</a>
            {% block nav_extra %}{% endblock %}
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
