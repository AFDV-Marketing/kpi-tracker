<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — AFDV Superpowers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        brand: { gold: '#FACC15', dark: '#0B0F1A', card: '#111827', border: '#1F2937', hover: '#1a2332' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0B0F1A; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; }
        .glass-strong { background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; }
        .glow-gold { box-shadow: 0 0 40px rgba(250, 204, 21, 0.08); }
        .glow-blue { box-shadow: 0 0 30px rgba(59, 130, 246, 0.1); }
        .score-green { background: linear-gradient(135deg, #064e3b, #065f46); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
        .score-yellow { background: linear-gradient(135deg, #78350f, #92400e); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
        .score-red { background: linear-gradient(135deg, #7f1d1d, #991b1b); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .score-na { background: rgba(31, 41, 55, 0.5); color: #6b7280; border: 1px solid rgba(75, 85, 99, 0.3); }
        .dot-green { background: #10b981; box-shadow: 0 0 6px rgba(16, 185, 129, 0.5); }
        .dot-yellow { background: #f59e0b; box-shadow: 0 0 6px rgba(245, 158, 11, 0.5); }
        .dot-red { background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.5); }
        .dot-na { background: #4b5563; }
        .gradient-text { background: linear-gradient(135deg, #FACC15, #F59E0B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-border { border-image: linear-gradient(135deg, rgba(250,204,21,0.3), rgba(245,158,11,0.1)) 1; }
        input, select, textarea { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(71, 85, 105, 0.5); color: #e2e8f0; border-radius: 10px; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #FACC15; outline: none; box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.15); }
        .progress-bar { background: rgba(51, 65, 85, 0.5); border-radius: 9999px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 9999px; transition: width 0.5s ease; }
        .nav-link { color: #94a3b8; transition: all 0.2s; padding: 6px 12px; border-radius: 8px; }
        .nav-link:hover { color: #FACC15; background: rgba(250, 204, 21, 0.05); }
        .nav-link.active { color: #FACC15; background: rgba(250, 204, 21, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #FACC15, #EAB308); color: #0B0F1A; font-weight: 600; border-radius: 10px; padding: 8px 20px; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(250, 204, 21, 0.3); }
        .btn-secondary { background: rgba(31, 41, 55, 0.8); color: #e2e8f0; border: 1px solid rgba(71, 85, 105, 0.5); border-radius: 10px; padding: 8px 20px; transition: all 0.2s; }
        .btn-secondary:hover { background: rgba(31, 41, 55, 1); border-color: rgba(250, 204, 21, 0.3); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        a { color: #FACC15; text-decoration: none; }
        a:hover { color: #FDE68A; }
        ::selection { background: rgba(250, 204, 21, 0.3); }
    </style>
</head>
<body class="h-full">
    <nav class="border-b border-white/5 px-6 py-3 sticky top-0 z-50" style="background: rgba(11, 15, 26, 0.85); backdrop-filter: blur(20px);">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/" class="flex items-center gap-3 no-underline group">
                    <img src="https://www.afdvmarketing.com/wp-content/uploads/2021/05/AFDV-Logo-Black-Horizontal.png" alt="AFDV" class="h-6 brightness-0 invert opacity-80 group-hover:opacity-100 transition">
                    <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-gradient-to-r from-amber-500/20 to-yellow-500/10 text-amber-400 border border-amber-500/20">Superpowers</span>
                </a>
                <div class="hidden md:flex items-center gap-1 ml-4">
                    <a href="/setup" class="nav-link text-sm {% block nav_setup %}{% endblock %}">Setup</a>
                    {% block nav_extra %}{% endblock %}
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs text-slate-600">v1.0</span>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-8 fade-in">
        {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-white/5 px-6 py-6 mt-12">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <p class="text-xs text-slate-600">AFDV Marketing — Amplify / Fuel / Drive / Visualize</p>
            <p class="text-xs text-slate-700">Built with the AFDV AI Gateway</p>
        </div>
    </footer>
</body>
</html>
